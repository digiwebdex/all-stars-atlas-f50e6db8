# ─── Seven Trip — Optimized Nginx Configuration ───
# Enables HTTP/2, Gzip/Brotli compression, aggressive static caching,
# and proper proxy settings for the Node.js backend.
#
# INSTALL:
#   1. sudo cp backend/nginx-optimized.conf /etc/nginx/sites-available/seventrip
#   2. sudo ln -sf /etc/nginx/sites-available/seventrip /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# For Brotli (optional but recommended):
#   sudo apt install libnginx-mod-brotli
#   Or: sudo apt install nginx-module-brotli

# ── Gzip settings (in http block or here) ──
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  application/xml+rss
  image/svg+xml
  font/woff2
  font/woff;

# ── Brotli (if module installed) ──
# brotli on;
# brotli_comp_level 6;
# brotli_min_length 256;
# brotli_types
#   text/plain
#   text/css
#   text/javascript
#   application/javascript
#   application/json
#   application/xml
#   image/svg+xml
#   font/woff2;

# ── Rate limiting for API ──
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name seventrip.com.bd www.seventrip.com.bd;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name seventrip.com.bd www.seventrip.com.bd;

    # SSL certs (update paths)
    ssl_certificate /etc/letsencrypt/live/seventrip.com.bd/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seventrip.com.bd/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/seventrip;
    index index.html;

    # ── Static assets: aggressive caching (1 year) ──
    # Vite hashed files are safe to cache forever
    location ~* \.(js|css|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Images & videos: 30 days ──
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── API proxy ──
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for slow GDS providers
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 45s;

        # Buffer settings for large flight responses
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;

        # HTML: no cache (always get latest deploy)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # ── Deny hidden files ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
